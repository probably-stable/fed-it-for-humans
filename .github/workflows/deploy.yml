name: Deploy to GitHub Pages

# Builds the Astro site and deploys it to GitHub Pages on every push to main.
# REQUIRED setup before this workflow will succeed:
#   1. Set the SITE_URL repository variable (Settings → Secrets and variables →
#      Actions → Variables) to the deployed origin, e.g.
#      https://probably-stable.github.io. If deploying as a project page,
#      also set BASE_PATH to the repo subpath (e.g. /fed-it-for-humans).
#      Without SITE_URL, astro.config.mjs throws on build (intentional guard).
#   2. In repo settings → Pages → Source = "GitHub Actions".
#   3. Push to main.
#
# Trigger manually with the "Run workflow" button if needed (workflow_dispatch).

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# only one deploy at a time; cancel in-flight if a new push lands
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build site
        env:
          SITE_URL: ${{ vars.SITE_URL }}
          BASE_PATH: ${{ vars.BASE_PATH }}
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
