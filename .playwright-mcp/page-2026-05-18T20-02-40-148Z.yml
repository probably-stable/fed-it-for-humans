  - main [ref=e7]:
    - generic [ref=e8]:
      - heading "Industry standards" [level=1] [ref=e9]
      - paragraph [ref=e10]: Your home territory. HIPAA primary, NIST CSF as voluntary adjunct, HITRUST as the structured certification path. The map below covers all of industry standards; the YouPanel zooms in on healthcare.
    - article [ref=e11]:
      - paragraph [ref=e12]: This is where healthcare actually lives. HIPAA is your primary regime, NIST CSF is the most common voluntary adjunct, HITRUST is the structured certification path for orgs that want external attestation. Most of what’s covered below is shared across industries — payment, SaaS, manufacturing, healthcare — but knowing the broader map is useful because your vendors, your auditors, your insurers, and your peers in other sectors all speak some piece of it.
      - 'region "Frame: Industry standards — the frameworks most of tech actually uses" [ref=e13]':
        - heading "Industry standards — the frameworks most of tech actually uses" [level=3] [ref=e14]
        - generic [ref=e15]:
          - generic [ref=e16]:
            - term [ref=e17]: Who
            - definition [ref=e18]: "Different frameworks, different bodies. CIS Controls and CIS Benchmarks: Center for Internet Security (non-profit). NIST CSF: NIST (U.S. federal). PCI-DSS: PCI Security Standards Council (founded by the card brands). HIPAA: U.S. federal law administered by HHS Office for Civil Rights. HITRUST CSF: HITRUST Alliance (private). SOC 2: AICPA (American Institute of CPAs). ISO 27001: International Organization for Standardization. GDPR: EU regulators; state privacy laws: state attorneys general."
          - generic [ref=e19]:
            - term [ref=e20]: What
            - definition [ref=e21]: "The cybersecurity and privacy frameworks that apply outside the federal RMF chain. A mix of federal law that reaches private orgs (HIPAA), federal voluntary frameworks (NIST CSF), state law (CCPA / CPRA / etc.), international law (GDPR), industry-mandated standards (PCI-DSS), and voluntary professional frameworks (SOC 2, ISO 27001, HITRUST, CIS Controls). What unites them: they govern security and privacy work that's not part of how federal information systems get authorized."
          - generic [ref=e22]:
            - term [ref=e23]: Where
            - definition [ref=e24]: Outside the federal RMF chain (FISMA → A-130 → NIST → agency overlay → STIG). For someone working in tech without federal contracts, this is the entire compliance landscape. For someone working federal-direct, this is the world your private-sector vendors and partners operate in.
          - generic [ref=e25]:
            - term [ref=e26]: Why
            - definition [ref=e27]: The federal compliance regime governs federal information systems. Everything else needs its own rules. Healthcare needs HIPAA. Payment processing needs PCI. International data handling needs GDPR. Service providers selling to enterprise customers need SOC 2 to close deals. Voluntary frameworks (CIS, CSF) fill in the gaps where regulation doesn't reach but the org wants structure anyway. The pluralism is the point — different sectors, different shapes.
          - generic [ref=e28]:
            - term [ref=e29]: How
            - definition [ref=e30]: Identify which frameworks apply to your work (regulatory + customer-driven + voluntary). Adopt the relevant control sets. Get certified or attested where required (SOC 2 attestation, ISO 27001 certification, PCI compliance validation). Maintain ongoing compliance via audit + monitoring cycles, with different vocabulary than the federal world but largely the same underlying activities.
      - heading "CIS Controls (different from CIS Benchmarks)" [level=2] [ref=e31]
      - paragraph [ref=e32]: "The Center for Internet Security publishes two distinct things and they often get confused:"
      - list [ref=e33]:
        - listitem [ref=e34]:
          - strong [ref=e35]: CIS Controls
          - text: — 18 high-level security practices (formerly the SANS Top 20). A starter framework for “what should a security program actually do.” Implementation Group 1 / 2 / 3 lets organizations adopt at their maturity level.
        - listitem [ref=e36]:
          - strong [ref=e37]: CIS Benchmarks
          - text: — per-product configuration baselines (covered in the STIGs and CIS chapter).
      - paragraph [ref=e38]: "Both are CIS, but they operate at different layers. The Controls are program-level; the Benchmarks are technical configuration. A mature org typically uses both: CIS Controls for the program structure, CIS Benchmarks for the actual hardening."
      - heading "NIST CSF (Cybersecurity Framework)" [level=2] [ref=e39]
      - paragraph [ref=e40]: "This is the federal-authored framework that most non-federal people DO encounter. Same NIST as 800-53, but a different shape — voluntary, designed for broader adoption than the federal control catalog. CSF 2.0 (released 2024) organizes security into six functions:"
      - list [ref=e41]:
        - listitem [ref=e42]:
          - strong [ref=e43]: Govern
          - text: — added in 2.0; covers governance, risk management context, oversight.
        - listitem [ref=e44]:
          - strong [ref=e45]: Identify
          - text: — what assets, risks, vulnerabilities exist.
        - listitem [ref=e46]:
          - strong [ref=e47]: Protect
          - text: — controls that prevent incidents.
        - listitem [ref=e48]:
          - strong [ref=e49]: Detect
          - text: — controls that find incidents.
        - listitem [ref=e50]:
          - strong [ref=e51]: Respond
          - text: — what happens when an incident is detected.
        - listitem [ref=e52]:
          - strong [ref=e53]: Recover
          - text: — how operations resume after an incident.
      - paragraph [ref=e54]: "Beneath the functions: about 100 categories and subcategories with mappings to other frameworks (including 800-53). The CSF is widely adopted across industry and increasingly referenced by cyber insurers, state regulators, and as a “reasonable cybersecurity” benchmark in court rulings."
      - paragraph [ref=e55]: If you’re going to know one thing from this chapter, know CSF. It’s the most common bridge between federal and non-federal security thinking.
      - heading "Industry-specific frameworks" [level=2] [ref=e56]
      - paragraph [ref=e57]: "These apply when the underlying work involves a specific kind of data or service:"
      - list [ref=e58]:
        - listitem [ref=e59]:
          - paragraph [ref=e60]:
            - strong [ref=e61]: PCI-DSS (Payment Card Industry Data Security Standard)
            - text: — applies to anyone storing, processing, or transmitting payment card data. Mandatory through contractual relationships with the card brands; enforced via annual validation (Self-Assessment Questionnaire for smaller merchants, on-site audit by a Qualified Security Assessor for larger ones). Currently on version 4.0 (released 2022, with the older 3.2.1 phased out).
        - listitem [ref=e62]:
          - paragraph [ref=e63]:
            - strong [ref=e64]: HIPAA + HITRUST
            - text: — HIPAA is U.S. federal healthcare privacy and security law (administered by HHS Office for Civil Rights). Required for covered entities and business associates. HITRUST CSF is a private framework that bundles HIPAA + NIST + ISO + others into a healthcare-tailored certification. HITRUST certification is widely accepted as evidence of HIPAA compliance + general security maturity.
        - listitem [ref=e65]:
          - paragraph [ref=e66]:
            - strong [ref=e67]: SOC 2 (Service Organization Control 2)
            - text: "— AICPA’s attestation framework for service providers. Audits cover the Trust Services Criteria (security plus optional Availability, Confidentiality, Processing Integrity, Privacy). Two report types: Type I (point-in-time) and Type II (period over time, more credible). SOC 2 Type II reports are the de facto entry ticket for selling SaaS to enterprise customers."
        - listitem [ref=e68]:
          - paragraph [ref=e69]:
            - strong [ref=e70]: ISO 27001 / 27002
            - text: — international management-system standard for information security. ISO 27001 specifies the management system (the ISMS); ISO 27002 is the catalog of controls. Certification is accredited and renewable; widely respected outside the U.S. and increasingly inside.
        - listitem [ref=e71]:
          - paragraph [ref=e72]:
            - strong [ref=e73]: Privacy laws (GDPR, state laws)
            - text: — GDPR (General Data Protection Regulation) is EU privacy law, applies to anyone processing EU residents’ personal data regardless of where the org is located. State privacy laws (California’s CCPA / CPRA, Virginia’s VCDPA, Colorado’s CPA, others as they pass) are state-level analogs. Each has its own enforcement body and its own specifics.
      - heading "Adoption patterns" [level=2] [ref=e74]
      - paragraph [ref=e75]: "Most orgs are on multiple of these at once. Common stacks:"
      - list [ref=e76]:
        - listitem [ref=e77]: "A SaaS company selling to enterprise: SOC 2 Type II + ISO 27001 + CIS Controls + GDPR (if EU customers) + state privacy laws."
        - listitem [ref=e78]: "A healthcare org: HIPAA + NIST CSF + HITRUST (if pursuing certification) + state privacy laws."
        - listitem [ref=e79]: "A payments processor: PCI-DSS + SOC 2 + ISO 27001 + state privacy laws."
        - listitem [ref=e80]: "A small business with a single regulated touchpoint: just whatever the regulation requires (PCI for the e-commerce site, HIPAA for the clinic, etc.)."
        - listitem [ref=e81]: "A state or local government IT shop: NIST CSF + state-specific IT regulations + sector-specific (CJIS for criminal justice systems, etc.). State/local government compliance is its own world this chapter doesn’t fully cover; flagged as a future addition."
      - paragraph [ref=e82]: The frameworks overlap heavily on the underlying control concepts — access management, audit logging, incident response, encryption, vendor management. A control implemented for SOC 2 usually satisfies most of ISO 27001 and a meaningful chunk of CIS. The work is real; the duplication is more in the documentation than in the controls themselves.
      - note [ref=e83]:
        - generic [ref=e84]:
          - generic [ref=e85]: ⚐
          - generic [ref=e86]: In the field
        - paragraph [ref=e88]: “Voluntary” frameworks become mandatory in practice when the customer demands them. SOC 2 is technically voluntary — there’s no law requiring a SaaS company to have it. But try selling to a Fortune 500 enterprise without one. Similarly, NIST CSF is voluntary, but cyber insurance carriers increasingly ask about CSF alignment in their underwriting questionnaires; “voluntary” in the abstract becomes “required to renew our coverage at the same premium” in the concrete. The map of what’s mandatory looks different depending on whether you read the regulations or the customer contracts.
      - complementary [ref=e89]:
        - generic [ref=e90]: For you, Jordan
        - generic [ref=e91]:
          - paragraph [ref=e92]: You live in industry standards by default. HIPAA is your primary regime; NIST CSF is the most common voluntary adjunct; HITRUST is the certification path for orgs that want a structured external attestation.
          - paragraph [ref=e93]: The HIPAA Security Rule’s three safeguards categories (Administrative, Physical, Technical) map roughly onto common control families across industry frameworks. The HIPAA Privacy Rule covers a different surface (use and disclosure of PHI rather than the technical security of PHI).
          - paragraph [ref=e94]: If your hospital is mature enough to pursue HITRUST certification, that becomes the master framework — HITRUST’s CSF references HIPAA, NIST, ISO, and others, so a HITRUST-certified org can demonstrate alignment with multiple frameworks via one assessment.
          - paragraph [ref=e95]:
            - strong [ref=e96]: "First-week move:"
            - text: ask whether your hospital is HITRUST-certified, pursuing it, or running pure HIPAA-only compliance. The answer tells you the structure of your security program — and what evidence the next audit will actually look at.
      - heading "That’s the map" [level=2] [ref=e97]
      - paragraph [ref=e98]:
        - text: You’ve walked the federal-IT compliance chain end to end and you’ve seen where healthcare touches it (and where it doesn’t). The defense contractor and classified forks are out of scope for this guide. From here, the
        - strong [ref=e99]: reference
        - text: chapters — glossary for fast acronym lookup, bookshelf for the official sources, about for what this guide is — are what you’d dip into when you need them.
      - note [ref=e100]:
        - paragraph [ref=e101]:
          - emphasis [ref=e102]: And if you’re standing up your hospital’s HIPAA program from zero — no prior risk analysis, no security officer, no policies?
          - strong [ref=e103]: GOOD LUCK.
          - text: 😂 You are about to discover that HIPAA is less a checklist than a 30-year-old conversation about “reasonable and appropriate.” Get a healthcare-specific compliance lawyer involved before you write a single policy.
