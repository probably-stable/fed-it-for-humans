  - main [ref=e7]:
    - generic [ref=e8]:
      - heading "The forks" [level=1] [ref=e9]
      - paragraph [ref=e10]: Where the federal-wide chain branches into specialized tracks. Defense contractor, classified, cloud, industry standards — each fork has its own additional rules layered on (or alongside) the foundation chain.
    - article [ref=e11]:
      - paragraph [ref=e12]: "The foundation chapters walked the federal-wide chain top to bottom: FISMA → A-130 → NIST → agency overlays → STIGs / CIS. That spine is the same for everyone working in federal IT, civilian or DoD direct."
      - paragraph [ref=e13]: But the chain forks. Different work environments add different specialized tracks on top of (or alongside) the foundation. A defense contractor handling CUI in their own environment has additional rules a federal-direct sysadmin doesn’t. A cloud service has FedRAMP overhead the on-prem world doesn’t see. Classified work adds whole additional overlay layers. Private-sector security work runs a parallel framework universe that touches federal in places but isn’t governed by it.
      - paragraph [ref=e14]: This chapter is the map. Knowing which fork (or forks) you’re on tells you which of the next chapters you actually need.
      - 'region "Frame: The forks — specialized tracks branching off the foundation chain" [ref=e15]':
        - heading "The forks — specialized tracks branching off the foundation chain" [level=3] [ref=e16]
        - generic [ref=e17]:
          - generic [ref=e18]:
            - term [ref=e19]: Who
            - definition [ref=e20]: Each fork has its own owners. CMMC and DFARS clauses are owned by DoD's Cyber Accreditation Body and contracting officers. FedRAMP is owned by the FedRAMP PMO at GSA. Classified overlays are owned by CNSS / IC. Industry-standard frameworks have their own bodies (CIS, NIST CSF authors, PCI Council, HITRUST Alliance, ISO, etc.).
          - generic [ref=e21]:
            - term [ref=e22]: What
            - definition [ref=e23]: Specialized compliance tracks that apply on top of (or in parallel to) the federal-wide foundation chain. Each fork addresses a specific kind of work — handling controlled defense data in non-federal environments, handling classified information, providing cloud services to federal agencies, or doing security work outside the federal contract universe entirely.
          - generic [ref=e24]:
            - term [ref=e25]: Where
            - definition [ref=e26]: Branching off the foundation chain at the agency-overlay or implementation layer. Some forks (CMMC + 800-171, FedRAMP) are direct overlays of NIST controls. Some (classified) add entire additional control families. Some (industry standards) replace federal frameworks with industry-specific ones.
          - generic [ref=e27]:
            - term [ref=e28]: Why
            - definition [ref=e29]: Federal IT isn't monolithic. Defense contractors handle Controlled Unclassified Information (CUI) in their own environments that needs protection beyond what civilian baselines cover. Cloud services need a standardized way to sell to many agencies without re-authorizing for each. Classified work has irreducible additional protection requirements. Private-sector work has its own pressures (PCI, HIPAA, SOC 2) that the federal frameworks don't address. Forks let each context have rules that fit.
          - generic [ref=e30]:
            - term [ref=e31]: How
            - definition [ref=e32]: Identify which fork(s) your work is on (often more than one). Read the dedicated chapter for each (where one exists in this guide). Map your system's compliance posture across all applicable forks. Document how you satisfy each in your SSP or equivalent.
      - heading "The five forks" [level=2] [ref=e33]
      - paragraph [ref=e34]: A short orientation. Each fork is named below with what it actually covers; the dedicated chapters that follow go deeper on the ones this guide covers.
      - list [ref=e35]:
        - listitem [ref=e36]:
          - paragraph [ref=e37]:
            - strong [ref=e38]: Federal direct
            - text: — the foundation chain by itself. You work for or with a federal agency (civilian or DoD) on federal information systems, and the chain we just walked is your whole picture. No additional fork; this is the baseline. Covered in the foundation set.
        - listitem [ref=e39]:
          - paragraph [ref=e40]:
            - strong [ref=e41]: Defense contractor (CMMC + 800-171 + DFARS)
            - text: —
            - strong [ref=e42]: out of scope for this guide.
            - text: If you handle Controlled Unclassified Information for the DoD or its supply chain
            - emphasis [ref=e43]: in your own (non-federal) environment
            - text: ", you’re on this fork — CMMC certification, NIST SP 800-171, DFARS clause 252.204-7012, and a program landscape that’s been actively reshaping for years. The author of this guide doesn’t have direct lived experience with this fork and won’t write speculatively about it. If you’re on it, the official sources (the CMMC Accreditation Body, DoD CIO, NIST 800-171 itself) and practitioners who do this work day-to-day are where to go."
            - emphasis [ref=e44]: "Open invitation: if a contributor with direct CMMC / 800-171 / DFARS experience wants to write this chapter, the project would welcome it."
        - listitem [ref=e45]:
          - paragraph [ref=e46]:
            - strong [ref=e47]: Classified
            - text: — additional overlay layers on top of NIST baselines. CNSSI 1253 for categorization (different impact dimensions than FIPS 199), ICD 503 for IC IT system risk management, JSIG for Special Access Programs. Cleared environments only. Named here for orientation; depth coverage is limited in this guide because the operational reality of cleared work is something the author hasn’t lived. The framework names and authority are accurate; the day-to-day shape is best learned from people who do it.
        - listitem [ref=e48]:
          - paragraph [ref=e49]:
            - strong [ref=e50]: Cloud services (FedRAMP)
            - text: — Federal Risk and Authorization Management Program. A standardized way for cloud services to be authorized once and reused across federal agencies. Built on a tailored NIST 800-53 baseline, assessed by FedRAMP-accredited 3PAOs, authorized by either Agency AOs or the JAB. If you provide a cloud service to federal customers, this is your fork. Dedicated chapter forthcoming.
        - listitem [ref=e51]:
          - paragraph [ref=e52]:
            - strong [ref=e53]: Industry standards
            - text: — CIS Controls + NIST CSF + industry-specific (PCI-DSS for payments, HIPAA + HITRUST for healthcare, SOC 2 / ISO 27001 for service providers, GDPR / state privacy laws for data handlers). Not governed by federal compliance regimes; runs alongside. Many private-sector orgs voluntarily adopt federal frameworks (NIST CSF most commonly) without being required to. Dedicated chapter forthcoming.
      - heading "How to know which fork(s) apply to you" [level=2] [ref=e54]
      - paragraph [ref=e55]: "Some quick triage questions:"
      - list [ref=e56]:
        - listitem [ref=e57]:
          - strong [ref=e58]: Do you have a federal contract?
          - text: If yes, you’re on the federal direct fork at minimum. If the contract involves cloud services, add FedRAMP. If the work touches classified information, add the classified fork.
        - listitem [ref=e59]:
          - strong [ref=e60]: Is the data classified?
          - text: If yes, the classified fork applies regardless of what other forks are also in play.
        - listitem [ref=e61]:
          - strong [ref=e62]: Do you handle CUI for DoD in your own (non-federal) environment?
          - text: If yes, defense contractor fork (CMMC + 800-171 + DFARS) — out of scope for this guide; see official CMMC / NIST / DoD CIO references.
        - listitem [ref=e63]:
          - strong [ref=e64]: Are you a cloud service used by federal agencies?
          - text: If yes, FedRAMP fork.
        - listitem [ref=e65]:
          - strong [ref=e66]: Are you in the private sector with no federal contracts?
          - text: Industry standards fork. Industry-specific within that (PCI, HIPAA, SOC 2, etc.) depending on what you handle.
      - paragraph [ref=e67]: "A single system frequently lands on multiple forks at once. A defense contractor running a cloud service handling CUI is on three forks: federal direct (baseline), defense contractor (CMMC, out of scope here), and FedRAMP (cloud). All three apply; all three need to be satisfied; only some are covered in this guide."
      - note [ref=e68]:
        - generic [ref=e69]:
          - generic [ref=e70]: ⚐
          - generic [ref=e71]: In the field
        - paragraph [ref=e73]: The fork landscape is not static. CMMC’s program rules have been actively reshaping over the last few years — assessment cadence, third-party assessor accreditation, what level of CMMC applies to which contract type, and the timeline for full rollout have all moved more than once. FedRAMP is in its own modernization push (the FedRAMP authorization process has been re-architected to shorten timelines and reduce cost). Whatever any chapter or guide says about the specific procedural state of a fork, verify against the current program documentation before relying on it. The structural shape stays stable; the specifics drift.
