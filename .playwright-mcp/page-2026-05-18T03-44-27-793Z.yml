            - text: "ask which of these forks your specific system is on. Phrasing it as a yes/no per fork makes the answer concrete: “is this a CMMC-covered environment? Is it FedRAMP-authorized? Is any of this classified?”"
      - heading "What’s next" [level=2] [ref=e87]
      - paragraph [ref=e88]:
        - text: The next chapter covers the
        - strong [ref=e89]: FedRAMP fork
        - text: "in depth: how cloud services get authorized for federal use, the difference between Agency ATO and JAB authorization paths, the role of 3PAOs, the FedRAMP impact levels (Low / Moderate / High / Li-SaaS), and what continuous monitoring looks like in the FedRAMP context. Most directly applies to Gary; useful orientation for Sam (since fed-direct shops use FedRAMP-authorized services) and for anyone considering a SaaS-to-fed career path."
