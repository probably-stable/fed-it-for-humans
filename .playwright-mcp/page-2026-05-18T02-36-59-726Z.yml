  - main [ref=e7]:
    - generic [ref=e8]:
      - heading "Industry standards" [level=1] [ref=e9]
      - paragraph [ref=e10]: The frameworks most people in tech already know — SOC 2, ISO 27001, PCI, HIPAA, NIST CSF, GDPR. Names you've probably heard through work, study, security cert prep, or breach coverage. Most of it traces back to federal thinking; almost nobody sees that.
    - article [ref=e11]:
      - paragraph [ref=e12]: For most people in tech, this is the world. SOC 2 reports. ISO 27001 certification. PCI-DSS audits. HIPAA. NIST CSF. GDPR and the state privacy laws. Most people in tech have at least heard of these — through work, through studying for a security certification, through a degree program, through cybersecurity media, through a friend in the field, through breach coverage in the news. They’re the recognizable names, even if you’ve never directly worked under any of them.
      - paragraph [ref=e13]:
        - text: What’s less obvious — and what makes this chapter worth reading even if the names are familiar — is that most of these frameworks trace back to federal thinking. NIST CSF
        - emphasis [ref=e14]: is
        - text: federal (NIST is U.S. Department of Commerce). SOC 2’s control concepts overlap heavily with NIST 800-53. ISO 27001 cross-references NIST work. HIPAA is federal law. Most of the industry standards were shaped by federal-side groundwork that came first; the industry-side branding came after.
      - paragraph [ref=e15]: For most people, NIST is the closest they ever get to the federal compliance regime, and they encounter it through CSF rather than 800-53 / RMF / ATO. The deeper federal mechanics covered in the foundation chapters are an edge case from the typical tech worker’s perspective — even though, structurally, the foundation is what these industry standards were built on.
      - paragraph [ref=e16]: This chapter walks the industry-standard frameworks and notes where each connects back to federal origin.
      - 'region "Frame: Industry standards — the frameworks most of tech actually uses" [ref=e17]':
        - heading "Industry standards — the frameworks most of tech actually uses" [level=3] [ref=e18]
        - generic [ref=e19]:
          - generic [ref=e20]:
            - term [ref=e21]: Who
            - definition [ref=e22]: "Different frameworks, different bodies. CIS Controls and CIS Benchmarks: Center for Internet Security (non-profit). NIST CSF: NIST (U.S. federal). PCI-DSS: PCI Security Standards Council (founded by the card brands). HIPAA: U.S. federal law administered by HHS Office for Civil Rights. HITRUST CSF: HITRUST Alliance (private). SOC 2: AICPA (American Institute of CPAs). ISO 27001: International Organization for Standardization. GDPR: EU regulators; state privacy laws: state attorneys general."
          - generic [ref=e23]:
            - term [ref=e24]: What
            - definition [ref=e25]: "The cybersecurity and privacy frameworks that apply outside the federal RMF chain. A mix of federal law that reaches private orgs (HIPAA), federal voluntary frameworks (NIST CSF), state law (CCPA / CPRA / etc.), international law (GDPR), industry-mandated standards (PCI-DSS), and voluntary professional frameworks (SOC 2, ISO 27001, HITRUST, CIS Controls). What unites them: they govern security and privacy work that's not part of how federal information systems get authorized."
          - generic [ref=e26]:
            - term [ref=e27]: Where
            - definition [ref=e28]: Outside the federal RMF chain (FISMA → A-130 → NIST → agency overlay → STIG). For someone working in tech without federal contracts, this is the entire compliance landscape. For someone working federal-direct, this is the world your private-sector vendors and partners operate in.
          - generic [ref=e29]:
            - term [ref=e30]: Why
            - definition [ref=e31]: The federal compliance regime governs federal information systems. Everything else needs its own rules. Healthcare needs HIPAA. Payment processing needs PCI. International data handling needs GDPR. Service providers selling to enterprise customers need SOC 2 to close deals. Voluntary frameworks (CIS, CSF) fill in the gaps where regulation doesn't reach but the org wants structure anyway. The pluralism is the point — different sectors, different shapes.
          - generic [ref=e32]:
            - term [ref=e33]: How
            - definition [ref=e34]: Identify which frameworks apply to your work (regulatory + customer-driven + voluntary). Adopt the relevant control sets. Get certified or attested where required (SOC 2 attestation, ISO 27001 certification, PCI compliance validation). Maintain ongoing compliance via audit + monitoring cycles, with different vocabulary than the federal world but largely the same underlying activities.
      - heading "CIS Controls (different from CIS Benchmarks)" [level=2] [ref=e35]
      - paragraph [ref=e36]: "The Center for Internet Security publishes two distinct things and they often get confused:"
      - list [ref=e37]:
        - listitem [ref=e38]:
          - strong [ref=e39]: CIS Controls
          - text: — 18 high-level security practices (formerly the SANS Top 20). A starter framework for “what should a security program actually do.” Implementation Group 1 / 2 / 3 lets organizations adopt at their maturity level.
        - listitem [ref=e40]:
          - strong [ref=e41]: CIS Benchmarks
          - text: — per-product configuration baselines (covered in the STIGs and CIS chapter).
      - paragraph [ref=e42]: "Both are CIS, but they operate at different layers. The Controls are program-level; the Benchmarks are technical configuration. A mature org typically uses both: CIS Controls for the program structure, CIS Benchmarks for the actual hardening."
      - heading "NIST CSF (Cybersecurity Framework)" [level=2] [ref=e43]
      - paragraph [ref=e44]: "This is the federal-authored framework that most non-federal people DO encounter. Same NIST as 800-53, but a different shape — voluntary, designed for broader adoption than the federal control catalog. CSF 2.0 (released 2024) organizes security into six functions:"
      - list [ref=e45]:
        - listitem [ref=e46]:
          - strong [ref=e47]: Govern
          - text: — added in 2.0; covers governance, risk management context, oversight.
        - listitem [ref=e48]:
          - strong [ref=e49]: Identify
          - text: — what assets, risks, vulnerabilities exist.
        - listitem [ref=e50]:
          - strong [ref=e51]: Protect
          - text: — controls that prevent incidents.
        - listitem [ref=e52]:
          - strong [ref=e53]: Detect
          - text: — controls that find incidents.
        - listitem [ref=e54]:
          - strong [ref=e55]: Respond
          - text: — what happens when an incident is detected.
        - listitem [ref=e56]:
          - strong [ref=e57]: Recover
          - text: — how operations resume after an incident.
      - paragraph [ref=e58]: "Beneath the functions: about 100 categories and subcategories with mappings to other frameworks (including 800-53). The CSF is widely adopted across industry and increasingly referenced by cyber insurers, state regulators, and as a “reasonable cybersecurity” benchmark in court rulings."
      - paragraph [ref=e59]: If you’re going to know one thing from this chapter, know CSF. It’s the most common bridge between federal and non-federal security thinking.
      - heading "Industry-specific frameworks" [level=2] [ref=e60]
      - paragraph [ref=e61]: "These apply when the underlying work involves a specific kind of data or service:"
      - list [ref=e62]:
        - listitem [ref=e63]:
          - paragraph [ref=e64]:
            - strong [ref=e65]: PCI-DSS (Payment Card Industry Data Security Standard)
            - text: — applies to anyone storing, processing, or transmitting payment card data. Mandatory through contractual relationships with the card brands; enforced via annual validation (Self-Assessment Questionnaire for smaller merchants, on-site audit by a Qualified Security Assessor for larger ones). Currently on version 4.0 (released 2022, with the older 3.2.1 phased out).
        - listitem [ref=e66]:
          - paragraph [ref=e67]:
            - strong [ref=e68]: HIPAA + HITRUST
            - text: — HIPAA is U.S. federal healthcare privacy and security law (administered by HHS Office for Civil Rights). Required for covered entities and business associates. HITRUST CSF is a private framework that bundles HIPAA + NIST + ISO + others into a healthcare-tailored certification. HITRUST certification is widely accepted as evidence of HIPAA compliance + general security maturity.
        - listitem [ref=e69]:
          - paragraph [ref=e70]:
            - strong [ref=e71]: SOC 2 (Service Organization Control 2)
            - text: "— AICPA’s attestation framework for service providers. Audits cover the Trust Services Criteria (security plus optional Availability, Confidentiality, Processing Integrity, Privacy). Two report types: Type I (point-in-time) and Type II (period over time, more credible). SOC 2 Type II reports are the de facto entry ticket for selling SaaS to enterprise customers."
        - listitem [ref=e72]:
          - paragraph [ref=e73]:
            - strong [ref=e74]: ISO 27001 / 27002
            - text: — international management-system standard for information security. ISO 27001 specifies the management system (the ISMS); ISO 27002 is the catalog of controls. Certification is accredited and renewable; widely respected outside the U.S. and increasingly inside.
        - listitem [ref=e75]:
          - paragraph [ref=e76]:
            - strong [ref=e77]: Privacy laws (GDPR, state laws)
            - text: — GDPR (General Data Protection Regulation) is EU privacy law, applies to anyone processing EU residents’ personal data regardless of where the org is located. State privacy laws (California’s CCPA / CPRA, Virginia’s VCDPA, Colorado’s CPA, others as they pass) are state-level analogs. Each has its own enforcement body and its own specifics.
      - heading "Adoption patterns" [level=2] [ref=e78]
      - paragraph [ref=e79]: "Most orgs are on multiple of these at once. Common stacks:"
      - list [ref=e80]:
        - listitem [ref=e81]: "A SaaS company selling to enterprise: SOC 2 Type II + ISO 27001 + CIS Controls + GDPR (if EU customers) + state privacy laws."
        - listitem [ref=e82]: "A healthcare org: HIPAA + NIST CSF + HITRUST (if pursuing certification) + state privacy laws."
        - listitem [ref=e83]: "A payments processor: PCI-DSS + SOC 2 + ISO 27001 + state privacy laws."
        - listitem [ref=e84]: "A small business with a single regulated touchpoint: just whatever the regulation requires (PCI for the e-commerce site, HIPAA for the clinic, etc.)."
        - listitem [ref=e85]: "A state or local government IT shop: NIST CSF + state-specific IT regulations + sector-specific (CJIS for criminal justice systems, etc.). State/local government compliance is its own world this chapter doesn’t fully cover; flagged as a future addition."
      - paragraph [ref=e86]: The frameworks overlap heavily on the underlying control concepts — access management, audit logging, incident response, encryption, vendor management. A control implemented for SOC 2 usually satisfies most of ISO 27001 and a meaningful chunk of CIS. The work is real; the duplication is more in the documentation than in the controls themselves.
      - note [ref=e87]:
        - generic [ref=e88]:
          - generic [ref=e89]: ⚐
          - generic [ref=e90]: In the field
        - paragraph [ref=e92]: “Voluntary” frameworks become mandatory in practice when the customer demands them. SOC 2 is technically voluntary — there’s no law requiring a SaaS company to have it. But try selling to a Fortune 500 enterprise without one. Similarly, NIST CSF is voluntary, but cyber insurance carriers increasingly ask about CSF alignment in their underwriting questionnaires; “voluntary” in the abstract becomes “required to renew our coverage at the same premium” in the concrete. The map of what’s mandatory looks different depending on whether you read the regulations or the customer contracts.
      - complementary [ref=e93]:
        - generic [ref=e94]: For you, Tom
        - generic [ref=e95]:
          - paragraph [ref=e96]: This is your home. None of the federal forks apply to you; industry standards is the entire compliance world you operate in or alongside.
          - paragraph [ref=e97]: "Whether you’re the person making framework decisions for your org or just an IT person who encounters these names in audit reports, vendor questionnaires, leadership emails, security training, or a customer’s procurement form — here’s the shape of each one:"
          - list [ref=e98]:
            - listitem [ref=e99]:
              - strong [ref=e100]: PCI-DSS
              - text: — applies if anyone in your org handles payment card data. Mandatory through card-brand contracts.
            - listitem [ref=e101]:
              - strong [ref=e102]: HIPAA
              - text: — U.S. federal law; applies if anyone handles health data as a covered entity or business associate.
            - listitem [ref=e103]:
              - strong [ref=e104]: SOC 2 Type II
              - text: — the de facto attestation report required to sell SaaS to enterprise customers. If your company has one, it’ll come up in sales cycles and customer due diligence.
            - listitem [ref=e105]:
              - strong [ref=e106]: GDPR
              - text: — EU privacy law; applies to anyone processing EU residents’ data.
            - listitem [ref=e107]:
              - strong [ref=e108]: State privacy laws
              - text: — CCPA / CPRA, VCDPA, CPA, and others as they pass. State-level analogs to GDPR.
            - listitem [ref=e109]:
              - strong [ref=e110]: CIS Controls
              - text: — voluntary best-practices framework, often the cheapest defensible starting point for a security program.
            - listitem [ref=e111]:
              - strong [ref=e112]: NIST CSF
              - text: — voluntary federal-authored framework; the most common bridge between federal and non-federal security thinking.
          - paragraph [ref=e113]: "If you ARE the decider for your org’s framework adoption, the pragmatic path for most small-to-mid orgs: CIS Controls IG1 as your program backbone, plus whatever industry-specific framework your sector requires, plus SOC 2 if your customers ask for it. Add ISO 27001 when you start selling internationally."
          - paragraph [ref=e114]:
            - strong [ref=e115]: "First-week move:"
            - text: make a list of every framework anyone (regulator, customer, insurer, your board, a colleague’s email, a vendor questionnaire) has mentioned in the last six months. That list tells you what your org cares about, even if you’re not the one deciding what to do about it.
      - heading "What’s next" [level=2] [ref=e116]
      - paragraph [ref=e117]: The foundation chain is covered. The forks chapter mapped the branches. FedRAMP and industry standards are now covered in depth. The defense contractor and classified forks are out of scope for this guide.
      - paragraph [ref=e118]:
        - text: "The remaining chapters that round out v1: a"
        - strong [ref=e119]: glossary
        - text: for fast acronym lookup, a
        - strong [ref=e120]: bookshelf
        - text: chapter pointing readers at the official sources for each major framework, and an
        - strong [ref=e121]: about
        - text: page explaining what this guide is and isn’t. Those wrap up the structural shape of the doc.
      - note [ref=e122]:
        - paragraph [ref=e123]:
          - emphasis [ref=e124]: And if your boss just walked over and said “we need to be SOC 2 by next quarter because our biggest customer is asking”?
          - strong [ref=e125]: GOOD LUCK.
          - text: 😂 SOC 2 isn’t federal but it lives in the same control family — once you’ve read this doc, you’ll recognize ~70% of what an auditor asks for. Pick a Type II, find an auditor who’ll do guided prep, budget six months even if your boss thinks it’s three.
