  - main [ref=e7]:
    - generic [ref=e8]:
      - heading "FISMA" [level=1] [ref=e9]
      - paragraph [ref=e10]: Federal law that doesn't apply to you. But it shapes your world quietly through your vendors' compliance costs, NIST citations in 'reasonable cybersecurity' litigation, and state laws that copy federal patterns.
    - article [ref=e11]:
      - paragraph [ref=e12]: FISMA is federal law for federal agencies. You’re not one, and most of your vendors aren’t either. The law genuinely doesn’t apply to you. But it shapes your world anyway — quietly, through vendor pricing, court citations, and state laws that copy federal patterns. Worth knowing what it is so the rest of the federal compliance vocabulary (which leaks into private-sector security thinking more than people realize) makes sense as you encounter it.
      - 'region "Frame: FISMA — Federal Information Security Modernization Act" [ref=e13]':
        - heading "FISMA — Federal Information Security Modernization Act" [level=3] [ref=e14]
        - generic [ref=e15]:
          - generic [ref=e16]:
            - term [ref=e17]: Who
            - definition [ref=e18]: "Authored by Congress. Implemented through OMB at the executive level. At the agency level: enforced by the agency CIO and CISO, with day-to-day responsibility delegated to ISSOs (Information System Security Officers)."
          - generic [ref=e19]:
            - term [ref=e20]: What
            - definition [ref=e21]:
              - text: A federal law (originally 2002 as the Federal Information Security
              - emphasis [ref=e22]: Management
              - text: Act, modernized 2014 to
              - emphasis [ref=e23]: Modernization
              - text: ) requiring every federal agency to develop, document, and implement an information security program. Codified at 44 U.S.C. § 3551 et seq.
          - generic [ref=e24]:
            - term [ref=e25]: Where
            - definition [ref=e26]: At the very top of the federal IT compliance chain. Everything downstream — OMB Circular A-130 policy, NIST FIPS standards, NIST SP 800 series, agency-specific overlays, STIGs and CIS Benchmarks at the technical layer — exists because FISMA requires it.
          - generic [ref=e27]:
            - term [ref=e28]: Why
            - definition [ref=e29]: Pre-FISMA, federal agencies had inconsistent or no formal information security programs. GAO reports flagged catastrophic gaps. Congress wanted measurable, reportable, federal-level accountability for cybersecurity. FISMA is the statutory basis for everything that came after.
          - generic [ref=e30]:
            - term [ref=e31]: How
            - definition [ref=e32]:
              - text: FISMA itself doesn't tell anyone
              - emphasis [ref=e33]: how
              - text: to do information security — it delegates that. The HOW gets specified in OMB policy directives (especially Circular A-130), then in NIST publications (FIPS standards are
              - emphasis [ref=e34]: mandatory
              - text: for federal systems via FISMA reference; SP 800 series is required by reference in many cases). Implementation flows down from there to STIGs and CIS Benchmarks at the technical configuration layer.
      - paragraph [ref=e35]: "A useful mental shape: FISMA is the constitutional layer. It says “thou shalt have an information security program” but doesn’t tell you what that means. The “what that means” is delegated downward. By the time you’re hardening a RHEL server, you’re doing work that has FISMA in its ancestry but is many layers removed from the law itself."
      - heading "What’s next" [level=2] [ref=e36]
      - paragraph [ref=e37]:
        - text: The next link in the chain is
        - strong [ref=e38]: OMB Circular A-130
        - text: — OMB policy that operationalizes FISMA. Doesn’t apply to you either, but it’s part of the federal-policy DNA that quietly shaped how private-sector orgs think about information governance over the last 25 years.
