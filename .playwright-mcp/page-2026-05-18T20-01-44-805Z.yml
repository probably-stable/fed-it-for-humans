  - main [ref=e7]:
    - generic [ref=e8]:
      - heading "OMB Circular A-130" [level=1] [ref=e9]
      - paragraph [ref=e10]: OMB policy that operationalizes FISMA into federal agency obligations. Doesn't apply to your hospital — but its shape (combined privacy+security, accountable officers, lifecycle management) maps directly onto HIPAA Privacy + Security.
    - article [ref=e11]:
      - paragraph [ref=e12]: "A-130 is the second federal-side link in the chain. It’s OMB (Office of Management and Budget) policy that tells federal agencies how to operationalize FISMA’s high-level requirements. Your hospital isn’t a federal agency, so A-130 doesn’t bind you. What does matter is the shape: privacy and security treated as one combined responsibility, formal accountable officers, lifecycle management of information. That architectural pattern is exactly what HIPAA Privacy Rule + HIPAA Security Rule together cover for healthcare."
      - 'region "Frame: OMB Circular A-130 — Managing Information as a Strategic Resource" [ref=e13]':
        - heading "OMB Circular A-130 — Managing Information as a Strategic Resource" [level=3] [ref=e14]
        - generic [ref=e15]:
          - generic [ref=e16]:
            - term [ref=e17]: Who
            - definition [ref=e18]: Authored and maintained by the Office of Management and Budget (OMB), part of the Executive Office of the President. Applies to all federal executive-branch agencies. Implementation is the agency CIO's responsibility; OMB reviews compliance via the annual FISMA reporting cycle and the budget process.
          - generic [ref=e19]:
            - term [ref=e20]: What
            - definition [ref=e21]: "A federal policy directive — a Circular, in OMB's vocabulary — most recently revised July 2016. Operationalizes FISMA into specific federal-agency obligations covering information security, privacy, IT investment management, and information lifecycle. Two main appendices carry most of the load: Appendix I (security and privacy framework), Appendix II (PII management). Privacy used to live in a separate Appendix III; the 2016 revision folded it into Appendix II."
          - generic [ref=e22]:
            - term [ref=e23]: Where
            - definition [ref=e24]: Sits one level below FISMA in the chain. FISMA → A-130 → NIST publications → agency overlays → STIGs and CIS Benchmarks at the technical layer. A-130 is the bridge. It's where the high-level statutory requirement of FISMA gets translated into federal-agency policy obligations.
          - generic [ref=e25]:
            - term [ref=e26]: Why
            - definition [ref=e27]: FISMA is broad. 'Agencies shall implement an information security program' doesn't tell anyone what the program looks like, what it must include, or how it gets reviewed. A-130 fills in those details. It's also where the federal government codified 'treat information as a strategic resource' — a framing that's now standard but was novel in earlier revisions.
          - generic [ref=e28]:
            - term [ref=e29]: How
            - definition [ref=e30]: A-130 itself doesn't do technical hardening — it explicitly delegates that to NIST. The Circular instructs agencies to implement security and privacy programs in accordance with NIST standards and guidelines. The actual 'how' lives downstream in NIST 800-53 (the controls catalog), the FIPS standards, and from there into STIGs and CIS Benchmarks at the configuration layer.
      - paragraph [ref=e31]: A-130 is one of those documents that’s important precisely because it’s invisible. It governs almost everything about federal information security policy, but most people who do federal IT work for years never read it. They read the agency policies that derive from it. Knowing A-130 exists, and that it’s the source for those agency policies, is the useful piece. The text itself is government writing — fine if you ever need to look something up; a slog to read end-to-end.
      - complementary [ref=e32]:
        - generic [ref=e33]: For you, Jordan
        - generic [ref=e34]:
          - paragraph [ref=e35]: A-130 doesn’t apply to you. It governs federal executive-branch agencies, and your hospital isn’t one. But the architectural shape — security and privacy treated as one combined responsibility, risk-based decision making, formal designation of accountable officers, lifecycle management of information — has analogs in healthcare.
          - paragraph [ref=e36]: HIPAA Privacy Rule and HIPAA Security Rule are conceptually close to A-130 Appendix II and Appendix I respectively. The vocabulary is different and the legal source is different, but the muscle is similar. If you understand A-130’s shape, HIPAA’s shape rhymes.
          - paragraph [ref=e37]:
            - strong [ref=e38]: "First-week move:"
            - text: if you’re newly responsible for a HIPAA program, look at HHS’s HIPAA Security Risk Assessment Tool. It’s the closest healthcare-side analog to the structured risk-based framework A-130 demands of federal agencies, and it’ll teach you the shape without the federal jargon.
      - heading "What’s next" [level=2] [ref=e39]
      - paragraph [ref=e40]:
        - text: A-130 hands the technical baton to NIST. The next chapter walks the
        - strong [ref=e41]: NIST publications
        - text: — what FIPS standards are (mandatory) versus the SP 800 series (the catalog) — and which ones you’ll actually encounter in healthcare even though most don’t apply to you legally.
