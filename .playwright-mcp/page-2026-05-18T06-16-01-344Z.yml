  - main [ref=e7]:
    - generic [ref=e8]:
      - heading "NIST SP 800-53 — the controls catalog" [level=1] [ref=e9]
      - paragraph [ref=e10]: The catalog of security and privacy controls that federal agencies pull from. Hundreds of controls organized into 20 families. Most fed IT security work eventually points at a control number from this document.
    - article [ref=e11]:
      - paragraph [ref=e12]: If RMF is the lifecycle, SP 800-53 is the toolbox. Every time you hear a control referenced by code — AC-2, AU-12, SI-4 — that code lives in this catalog. SP 800-53 is the most-cited NIST publication in fed IT, and it’s the document you’ll learn to navigate one control at a time.
      - 'region "Frame: NIST SP 800-53 — Security and Privacy Controls for Information Systems and Organizations" [ref=e13]':
        - heading "NIST SP 800-53 — Security and Privacy Controls for Information Systems and Organizations" [level=3] [ref=e14]
        - generic [ref=e15]:
          - generic [ref=e16]:
            - term [ref=e17]: Who
            - definition [ref=e18]: Authored and maintained by NIST. Used by every federal agency, every federal contractor, every cloud service in FedRAMP. Currently on revision 5 (released September 2020); rev 4 documentation still exists in older programs that haven't migrated.
          - generic [ref=e19]:
            - term [ref=e20]: What
            - definition [ref=e21]: A catalog of security and privacy controls that organizations select from to satisfy FIPS 200's minimum security requirements. Roughly 1,000 controls (including enhancements) across 20 control families in rev 5. Each control has a code (e.g. AC-2 for Account Management), a control statement, discussion, related controls, and optional control enhancements.
          - generic [ref=e22]:
            - term [ref=e23]: Where
            - definition [ref=e24]: Pulled from at the Select step of the RMF. Implemented at the Implement step. Assessed (per SP 800-53A) at the Assess step. Most fed IT security findings, audit results, and SSP entries trace back to specific control numbers from this catalog.
          - generic [ref=e25]:
            - term [ref=e26]: Why
            - definition [ref=e27]: FIPS 200 says federal agencies must address 17 minimum security requirement areas. SP 800-53 is the catalog those requirements pull from — with enough specificity that an agency can pick a baseline (Low / Moderate / High) and have a defensible starting point for what to implement. Without 800-53, every agency would invent their own control language.
          - generic [ref=e28]:
            - term [ref=e29]: How
            - definition [ref=e30]: At the Select step, agencies pick a baseline from SP 800-53B based on the system's FIPS 199 categorization. Then they tailor the baseline (add controls, remove controls, document why). The selected controls go into the SSP. At Implement, the controls get deployed via STIGs, CIS Benchmarks, vendor configs, etc. At Assess, the SP 800-53A procedures evaluate whether each control is effective.
      - heading "The 20 control families" [level=2] [ref=e31]
      - paragraph [ref=e32]: "Each family has a 2-letter code. Memorizing them is unnecessary — you’ll absorb them by use — but recognition helps a lot when reading SSPs and audit findings:"
