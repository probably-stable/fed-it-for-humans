  - main [ref=e7]:
    - generic [ref=e8]:
      - heading "NIST publications" [level=1] [ref=e9]
      - paragraph [ref=e10]: The technical standards and guidelines that A-130 mandates federal agencies use. FIPS standards are mandatory; SP 800 series is the catalog. Most of the security work in fed IT cites these by number.
    - article [ref=e11]:
      - paragraph [ref=e12]: A-130 hands the technical baton to NIST and walks off. Everything below A-130 in the chain — the actual standards, the control catalogs, the assessment procedures, the categorization frameworks — comes from NIST. If you do federal IT work, you will see “800-53” and “FIPS 199” and “RMF” cited in your contract, your SSP, your training, your audit findings. They’re all NIST.
      - 'region "Frame: NIST publications — FIPS standards + SP 800 series" [ref=e13]':
        - heading "NIST publications — FIPS standards + SP 800 series" [level=3] [ref=e14]
        - generic [ref=e15]:
          - generic [ref=e16]:
            - term [ref=e17]: Who
            - definition [ref=e18]: Authored by NIST (National Institute of Standards and Technology), part of the U.S. Department of Commerce. The Computer Security Resource Center (CSRC) within NIST owns the security publications. Federal mandate to do this work comes from FISMA and A-130.
          - generic [ref=e19]:
            - term [ref=e20]: What
            - definition [ref=e21]: Two families of publications. FIPS (Federal Information Processing Standards) are mandatory federal standards — federal agencies MUST satisfy them. SP 800 series (Special Publications, 800 numbering for the security/privacy series) are guidelines — many are required by reference through FIPS, which makes them effectively mandatory in practice.
          - generic [ref=e22]:
            - term [ref=e23]: Where
            - definition [ref=e24]: "Sit below A-130 in the chain. A-130 says 'agencies shall use NIST standards and guidelines.' NIST publications are those standards and guidelines. Below NIST: agency-specific overlays, then STIGs and CIS Benchmarks at the technical configuration layer."
          - generic [ref=e25]:
            - term [ref=e26]: Why
            - definition [ref=e27]: FISMA and A-130 needed someone to write the actual technical specifications. NIST is the federal government's standards body — non-political, technically respected, with a long history of publishing standards used worldwide. The split between FIPS (short, stable, mandatory) and SP 800 (detailed, evolving, often required by reference) keeps the must-haves stable while allowing detailed guidance to be revised more often.
          - generic [ref=e28]:
            - term [ref=e29]: How
            - definition [ref=e30]: "For agencies: categorize the system per FIPS 199, select controls per SP 800-53 + 800-53B baselines, implement via STIGs and CIS Benchmarks at the technical layer, assess per SP 800-53A, authorize per SP 800-37 (the RMF). For sysadmins: you reference these publications as needed — usually you'll be reading SP 800-53 to understand what a specific control means. End-to-end reading is rare; lookup-driven reading is constant."
      - paragraph [ref=e31]: "The full NIST catalog runs to hundreds of publications. The ones you’ll actually meet in federal IT security work are a much smaller set:"
      - list [ref=e32]:
        - listitem [ref=e33]:
          - strong [ref=e34]: FIPS 199
          - text: — security categorization (Low, Moderate, High based on impact to confidentiality, integrity, availability). The first thing done to any new federal information system.
        - listitem [ref=e35]:
          - strong [ref=e36]: FIPS 200
          - text: — minimum security requirements. Calls out 17 minimum security requirement
          - emphasis [ref=e37]: areas
          - text: that every federal system must address. (These areas became control families in SP 800-53; the family count has since grown to 20 — see below.) Short document; high authority.
        - listitem [ref=e38]:
          - strong [ref=e39]: FIPS 140-3
          - text: — cryptographic module validation. Determines what crypto is acceptable for federal use. (FIPS 140-2 is the prior version; you’ll see both cited depending on procurement age.)
        - listitem [ref=e40]:
          - strong [ref=e41]: SP 800-37
          - text: "— Risk Management Framework (the RMF). The lifecycle process for authorizing federal systems: Prepare, Categorize, Select, Implement, Assess, Authorize, Monitor."
        - listitem [ref=e42]:
          - strong [ref=e43]: SP 800-53
          - text: — Security and Privacy Controls Catalog. The big one. Roughly 1,000 controls (with enhancements) across 20 families in rev 5. Started from FIPS 200’s 17 areas; PM (Program Management) was added in rev 4, then PT (PII) and SR (Supply Chain) in rev 5. Most fed IT security work eventually points back to a control number from this document.
        - listitem [ref=e44]:
          - strong [ref=e45]: SP 800-53A
          - text: — assessment procedures for the controls in 800-53. What an assessor or 3PAO is following when they evaluate your system.
        - listitem [ref=e46]:
          - strong [ref=e47]: SP 800-53B
          - text: — control baselines (Low, Moderate, High). Maps the FIPS 199 categorization to which controls apply.
        - listitem [ref=e48]:
          - strong [ref=e49]: SP 800-60
          - text: — guide for mapping information types to security categories. Helps the FIPS 199 categorization decision.
        - listitem [ref=e50]:
          - strong [ref=e51]: SP 800-171
          - text: — controls for Controlled Unclassified Information (CUI) in non-federal systems. The one defense contractors hit via CMMC.
        - listitem [ref=e52]:
          - strong [ref=e53]: SP 800-172
          - text: — enhanced security requirements (the advanced tier of 800-171). For high-value targets where the threat picture is significant.
      - paragraph [ref=e54]: That’s roughly 10 publications. Your work, no matter where you sit in the chain, mostly traces back to those.
      - paragraph [ref=e55]: "There are also things that look like NIST publications but live outside the FIPS / SP 800 numbering:"
      - list [ref=e56]:
        - listitem [ref=e57]:
          - strong [ref=e58]: NIST CSF (Cybersecurity Framework)
          - text: "— voluntary, widely adopted in the private sector and in healthcare. As of CSF 2.0 (released 2024), six functions: Govern, Identify, Protect, Detect, Respond, Recover. Different shape than 800-53; easier on-ramp for organizations that don’t have FISMA pressure. We’ll cover it in its own chapter for the personas it actually applies to."
      - 'heading "Specialized frameworks: network, OT, AI" [level=2] [ref=e59]'
      - paragraph [ref=e60]: "The list above covers the security/privacy core. NIST also publishes specialized frameworks for specific technical domains. Three worth knowing about right now because they’re growing fast and you’ll start seeing them cited:"
      - list [ref=e61]:
        - listitem [ref=e62]:
          - paragraph [ref=e63]:
            - strong [ref=e64]: NIST SP 800-207 — Zero Trust Architecture (ZTA).
            - text: The federal reference for Zero Trust, released 2020. Federal agencies are required to align with it via OMB Memorandum M-22-09 (the Federal Zero Trust Strategy, which derives from Executive Order 14028 on cybersecurity). If you hear “we’re going Zero Trust” at a federal shop, this is the document setting the bar. Private-sector ZTA programs frequently reference it too.
        - listitem [ref=e65]:
          - paragraph [ref=e66]:
            - strong [ref=e67]: NIST SP 800-82 — Guide to Operational Technology (OT) Security.
            - text: Most recent revision is rev 3 (2023). Originally focused on Industrial Control Systems (ICS); now covers OT broadly — anything that’s “computers controlling physical things.” Critical for energy, water, manufacturing, healthcare medical devices, and any federal R&D facility with lab equipment or specialized research infrastructure.
        - listitem [ref=e68]:
          - paragraph [ref=e69]:
            - strong [ref=e70]: NIST AI Risk Management Framework (AI RMF 1.0).
            - text: Released January 2023; companion document NIST AI 600-1 (Generative AI profile) released July 2024. Voluntary framework for managing AI-specific risks. Increasingly referenced as federal agencies and private companies integrate AI tools, and as procurement starts asking “are you AI RMF aligned?”
      - paragraph [ref=e71]: Each of these will probably get its own chapter eventually, especially if your work touches that domain.
      - complementary [ref=e72]:
        - generic [ref=e73]: For you, Sam
        - generic [ref=e74]:
          - paragraph [ref=e75]: You’ll probably read pieces of SP 800-53 and SP 800-37 over time, never end-to-end. The catalog is reference material — you look up specific controls when you’re working on something or when an assessor flags a finding. Your day-to-day work happens via STIGs and CIS Benchmarks at the technical layer; the NIST docs are the WHY behind what STIGs ask you to do.
          - paragraph [ref=e76]: The most useful piece of the NIST catalog to know early is the relationship between FIPS 199 and SP 800-53B. FIPS 199 sorts your system into Low, Moderate, or High; SP 800-53B says which controls apply at each level. If you understand that mapping, half the questions about “why do we need this control” answer themselves.
          - paragraph [ref=e77]:
            - strong [ref=e78]: "First-week move:"
            - text: ask what your system’s FIPS 199 categorization is. If your boss or ISSO can tell you “Moderate” or “High” without looking it up, you have a useful anchor for everything else.
          - paragraph [ref=e79]:
            - text: If your work touches lab equipment, specialized research infrastructure, or any “computers controlling physical things,”
            - strong [ref=e80]: SP 800-82 (OT security)
            - text: comes into play and you’ll see it referenced in your agency’s policies. Similarly, if your shop is rolling out Zero Trust per M-22-09,
            - strong [ref=e81]: SP 800-207
            - text: is the technical reference behind that effort.
      - heading "What’s next" [level=2] [ref=e82]
      - paragraph [ref=e83]:
        - text: "The next chapter goes one level deeper into the most-cited publication of the bunch:"
        - strong [ref=e84]: NIST SP 800-37, the Risk Management Framework (RMF)
        - text: . This is the seven-step lifecycle federal agencies use to authorize and continuously monitor information systems. Almost every job posting in fed IT mentions it. Worth a chapter on its own.
