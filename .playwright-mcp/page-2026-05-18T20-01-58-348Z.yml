    - generic [ref=e8]:
      - heading "NIST RMF (SP 800-37)" [level=1] [ref=e9]
      - paragraph [ref=e10]: The 7-step federal lifecycle for authorizing and continuously monitoring information systems. Doesn't apply to your hospital — but HIPAA Security Rule's shape rhymes, and any system handling federal data flows likely runs an RMF-shaped process for that scope.
    - article [ref=e11]:
      - paragraph [ref=e12]: RMF is the federal-government lifecycle that takes a system from “we want to build this” to “this system is authorized to operate” to “we’re monitoring it forever.” Federal agencies live inside it. Your hospital doesn’t — but the shape is recognizable. HIPAA Security Rule’s risk-analysis → policy → implementation → ongoing review cycle is the same muscle in different vocabulary, and any of your systems that touch federal data flows likely runs RMF-shaped work for that specific scope.
      - 'region "Frame: NIST SP 800-37 — Risk Management Framework (RMF)" [ref=e13]':
        - heading "NIST SP 800-37 — Risk Management Framework (RMF)" [level=3] [ref=e14]
        - generic [ref=e15]:
          - generic [ref=e16]:
            - term [ref=e17]: Who
            - definition [ref=e18]: "Authored by NIST. Operated by a cast of agency roles: the System Owner runs the show, the ISSO (Information System Security Officer) handles day-to-day security, the Authorizing Official (AO) makes the formal risk decision at the Authorize step, and an independent assessor (or a 3PAO in FedRAMP) evaluates the controls."
          - generic [ref=e19]:
            - term [ref=e20]: What
            - definition [ref=e21]: "A federal-government lifecycle for managing information system security risk. Seven steps: Prepare, Categorize, Select, Implement, Assess, Authorize, Monitor. Originally six steps; the Prepare step was added in rev 2 (2018) to formalize organizational-level groundwork."
          - generic [ref=e22]:
            - term [ref=e23]: Where
            - definition [ref=e24]: "Inside the NIST publications family — SP 800-37 specifically — but functionally the practical center of fed IT compliance. Most concrete fed IT work happens inside one of the seven steps for some system at some time. Adjacent: the controls catalog (SP 800-53), the categorization standard (FIPS 199), the assessment procedures (SP 800-53A) — all of which the RMF references."
          - generic [ref=e25]:
            - term [ref=e26]: Why
            - definition [ref=e27]: "Pre-RMF, federal authorization was a one-shot certification process. Systems got 'certified and accredited' once, then were essentially out of scope until someone forced re-cert. RMF reframed authorization as a lifecycle: risk management is continuous, ATO is one milestone, monitoring keeps going. The practical effect: instead of a paper exercise every few years, agencies are supposed to be running a continuous risk-management program."
          - generic [ref=e28]:
            - term [ref=e29]: How
            - definition [ref=e30]: Walk the seven steps in sequence for each system, then loop back into Monitor continuously. The System Security Plan (SSP) is the master document that grows through Categorize / Select / Implement. The POA&M tracks known weaknesses through Assess and beyond. The AO grants the ATO at Authorize. Continuous monitoring then runs for the system's whole life.
      - paragraph [ref=e31]: "The seven steps, plain language:"
      - list [ref=e32]:
        - listitem [ref=e33]:
          - strong [ref=e34]: Prepare
          - text: — organizational and system-level groundwork before the lifecycle starts. Identifies stakeholders, common controls, risk tolerance. Added in rev 2 (2018) to formalize what good agencies were already doing.
        - listitem [ref=e35]:
          - strong [ref=e36]: Categorize
          - text: — apply FIPS 199 to determine the system’s impact level (Low, Moderate, High) based on confidentiality, integrity, and availability.
        - listitem [ref=e37]:
          - strong [ref=e38]: Select
          - text: — pick the appropriate controls from SP 800-53, using the SP 800-53B baseline that matches the FIPS 199 category. Tailor as needed.
        - listitem [ref=e39]:
          - strong [ref=e40]: Implement
          - text: — actually deploy the controls. This is where STIGs, CIS Benchmarks, and vendor-specific hardening guides get applied.
        - listitem [ref=e41]:
          - strong [ref=e42]: Assess
          - text: — an independent assessor evaluates whether the controls are working as documented. Findings get recorded.
        - listitem [ref=e43]:
          - strong [ref=e44]: Authorize
          - text: — the Authorizing Official reviews everything, weighs the risk, and either grants ATO (Authorization to Operate), grants a conditional or interim ATO, or denies. This is the major milestone.
        - listitem [ref=e45]:
          - strong [ref=e46]: Monitor
          - text: — continuous monitoring kicks in. Ongoing scans, periodic re-assessment, change management, POA&M tracking. The system stays in this step until it’s decommissioned.
      - paragraph [ref=e47]:
        - text: "The whole loop produces three artifacts you’ll see referenced constantly: the"
        - strong [ref=e48]: System Security Plan (SSP)
        - text: ", the"
        - strong [ref=e49]: Plan of Action and Milestones (POA&M)
        - text: ", and the"
        - strong [ref=e50]: ATO letter
        - text: itself.
      - note [ref=e51]:
        - generic [ref=e52]:
          - generic [ref=e53]: ⚐
          - generic [ref=e54]: In the field
        - paragraph [ref=e56]:
          - text: How long an authorized system stays authorized varies by shop. Some agencies still do
          - strong [ref=e57]: fixed-period reauthorization
          - text: — three-year cycles where the system goes through a full re-assessment to renew its ATO. Others have moved to
          - strong [ref=e58]: ongoing authorization
          - text: — the system stays authorized as long as continuous-monitoring metrics stay green, with no fixed expiration. The model your shop runs determines whether you experience compliance work as a periodic scramble or a steady background load. Worth asking which one your agency uses.
      - complementary [ref=e59]:
        - generic [ref=e60]: For you, Jordan
        - generic [ref=e61]:
          - paragraph [ref=e62]: Healthcare doesn’t run RMF formally. But the shape is recognizable.
          - paragraph [ref=e63]: "The HIPAA Security Rule has similar phases — risk analysis, policy and procedure development, implementation, ongoing review. The vocabulary is different (HIPAA talks about “addressable” and “required” implementation specifications instead of “controls”), but the muscle is the same: identify what needs protecting, decide what protects it, implement, verify, monitor."
          - paragraph [ref=e64]:
            - text: If any of your hospital’s systems touch federal data flows (Medicare claims, federally funded research, VA telehealth), that
            - emphasis [ref=e65]: specific
            - text: system likely runs RMF-shaped work for its federal-facing scope.
          - paragraph [ref=e66]:
            - strong [ref=e67]: "First-week move:"
            - text: ask whether your hospital has a documented information security risk-management process. If yes, ask what framework it follows. The answer tells you whether you’re in HIPAA-only territory or HIPAA + NIST-aligned territory.
      - heading "What’s next" [level=2] [ref=e68]
      - paragraph [ref=e69]:
        - text: "The next chapter goes one level deeper into the most-cited piece of the RMF:"
        - strong [ref=e70]: NIST SP 800-53, the controls catalog
        - text: . The Select step of the RMF pulls from this document. Most fed IT security work eventually points at a control number from 800-53. In healthcare, 800-53 shows up as HHS OCR’s reference point for “reasonable and appropriate” cybersecurity.
