  - main [ref=e10]:
    - generic [ref=e11]:
      - heading "FISMA" [level=1] [ref=e12]
      - paragraph [ref=e13]: The federal law that requires every agency to have an information security program. The top of the chain. Everything else flows from this.
    - article [ref=e14]:
      - paragraph [ref=e15]: Most people in federal IT first hear “FISMA” in a meeting and nod along because the alternative is admitting they don’t know what it is. So let’s just say it. FISMA is a law. It’s the law that requires federal agencies to have an information security program. Everything you’ll learn after this (NIST publications, agency policies, STIGs, the whole compliance apparatus) exists because FISMA exists.
      - paragraph [ref=e16]: "Here’s the W’s:"
      - 'region "Frame: FISMA — Federal Information Security Modernization Act" [ref=e17]':
        - heading "FISMA — Federal Information Security Modernization Act" [level=3] [ref=e18]
        - generic [ref=e19]:
          - generic [ref=e20]:
            - term [ref=e21]: Who
            - definition [ref=e22]: "Authored by Congress. Implemented through OMB at the executive level. At the agency level: enforced by the agency CIO and CISO, with day-to-day responsibility delegated to ISSOs (Information System Security Officers)."
          - generic [ref=e23]:
            - term [ref=e24]: What
            - definition [ref=e25]:
              - text: A federal law (originally 2002 as the Federal Information Security
              - emphasis [ref=e26]: Management
              - text: Act, modernized 2014 to
              - emphasis [ref=e27]: Modernization
              - text: ) requiring every federal agency to develop, document, and implement an information security program. Codified at 44 U.S.C. § 3551 et seq.
          - generic [ref=e28]:
            - term [ref=e29]: Where
            - definition [ref=e30]: At the very top of the federal IT compliance chain. Everything downstream — OMB Circular A-130 policy, NIST FIPS standards, NIST SP 800 series, agency-specific overlays, STIGs and CIS Benchmarks at the technical layer — exists because FISMA requires it.
          - generic [ref=e31]:
            - term [ref=e32]: Why
            - definition [ref=e33]: Pre-FISMA, federal agencies had inconsistent or no formal information security programs. GAO reports flagged catastrophic gaps. Congress wanted measurable, reportable, federal-level accountability for cybersecurity. FISMA is the statutory basis for everything that came after.
          - generic [ref=e34]:
            - term [ref=e35]: How
            - definition [ref=e36]:
              - text: FISMA itself doesn't tell anyone
              - emphasis [ref=e37]: how
              - text: to do information security — it delegates that. The HOW gets specified in OMB policy directives (especially Circular A-130), then in NIST publications (FIPS standards are
              - emphasis [ref=e38]: mandatory
              - text: for federal systems via FISMA reference; SP 800 series is required by reference in many cases). Implementation flows down from there to STIGs and CIS Benchmarks at the technical configuration layer.
      - paragraph [ref=e39]: "A useful mental shape: FISMA is the constitutional layer. It says “thou shalt have an information security program” but doesn’t tell you what that means. The “what that means” is delegated downward. By the time you’re hardening a RHEL server, you’re doing work that has FISMA in its ancestry but is many layers removed from the law itself."
      - complementary [ref=e40]:
        - generic [ref=e41]: For you, Gary
        - generic [ref=e42]:
          - paragraph [ref=e43]: FISMA is the WHY behind your FedRAMP program. Federal agencies can only buy your service if it satisfies FISMA, and FedRAMP is the standardized mechanism they use to verify that. Every agency CIO authorizing your service is making a FISMA-driven decision. The 3PAO assessment, the continuous monitoring obligation, the annual reauthorization — all of it traces back to FISMA’s “agencies must verify their information security” requirement.
          - paragraph [ref=e44]: You probably won’t read the FISMA text, but you’ll feel its gravity in your audit calendar.
          - paragraph [ref=e45]:
            - strong [ref=e46]: "First-week move:"
            - text: ask whoever runs your compliance program how your FedRAMP authorization works. The answer tells you who your real “customer” is for compliance purposes.
      - paragraph [ref=e47]: "A reality check before we move on: most people in federal IT don’t talk about FISMA day-to-day. You might hear it once from a senior or a mentor — usually framed as “FISMA is the law, everything else derives from it” — and then it sits as background. The work you’ll actually feel is downstream: NIST 800-53 controls, ATOs, POA&Ms, scan findings. If you go your first six months in a fed IT job and never hear “FISMA” again after orientation, nobody would be surprised."
      - heading "What’s next" [level=2] [ref=e48]
      - paragraph [ref=e49]:
        - text: The next link in the chain is
        - strong [ref=e50]: OMB Circular A-130
        - text: — the policy document that operationalizes FISMA’s high-level requirements into specific obligations for federal agencies. If FISMA is the law, A-130 is the implementing policy. We’ll cover it next.
