  - main [ref=e7]:
    - generic [ref=e8]:
      - heading "FedRAMP" [level=1] [ref=e9]
      - paragraph [ref=e10]: Federal program for authorizing cloud services. Doesn't apply to your hospital directly — but federal data flows that ride on FedRAMP-authorized cloud services and 'GovCloud' offerings are the two indirect touches that matter.
    - article [ref=e11]:
      - paragraph [ref=e12]: "FedRAMP is how cloud services get authorized for federal-agency use. Your hospital’s HIPAA work doesn’t depend on it — for pure HIPAA, HITRUST-certified or HIPAA-aligned cloud services are usually the more relevant reference point. But two indirect touches show up in healthcare often enough to know the program: your federal data flows (Medicare admin, federally funded research, VA telehealth) may need to ride on FedRAMP-authorized services to satisfy their federal-side scope, and “GovCloud” offerings (AWS GovCloud, Azure Government, GCP Government Cloud) are all FedRAMP High-authorized environments that hospitals sometimes adopt for federal-grade isolation."
      - 'region "Frame: FedRAMP — Federal Risk and Authorization Management Program" [ref=e13]':
        - heading "FedRAMP — Federal Risk and Authorization Management Program" [level=3] [ref=e14]
        - generic [ref=e15]:
          - generic [ref=e16]:
            - term [ref=e17]: Who
            - definition [ref=e18]: "Run by the FedRAMP Program Management Office (PMO) at GSA. Established by OMB Memorandum M-11-26 (December 2011). Governance involves the CIO Council and the Joint Authorization Board (JAB — historically the CIOs of DHS, DoD, and GSA). The actors who do the work: Cloud Service Providers (CSPs), Third-Party Assessment Organizations (3PAOs), and Authorizing Officials (AOs) at agencies."
          - generic [ref=e19]:
            - term [ref=e20]: What
            - definition [ref=e21]: A standardized program for security assessment, authorization, and continuous monitoring of cloud services used by federal agencies. The CSP documents its security against a tailored NIST 800-53 baseline; an accredited 3PAO assesses; an AO authorizes. Once authorized, the service appears on the FedRAMP Marketplace and other agencies can leverage that authorization for their own use.
          - generic [ref=e22]:
            - term [ref=e23]: Where
            - definition [ref=e24]: Sits as a specialized fork of the federal-direct chain. Built on top of NIST 800-53 (with FedRAMP-specific tailoring). FedRAMP-authorized services then plug into agency RMF processes — agencies layer their own overlays on top of the FedRAMP baseline when they procure.
          - generic [ref=e25]:
            - term [ref=e26]: Why
            - definition [ref=e27]: "Pre-FedRAMP, every agency would have to assess and authorize every cloud service independently. That meant the same SaaS would go through dozens of redundant authorizations across the government, each costing months of CSP and agency time. FedRAMP standardizes the work — assess once, authorize once, leverage many times. The structural goal: reduce redundant compliance work without lowering the security bar."
          - generic [ref=e28]:
            - term [ref=e29]: How
            - definition [ref=e30]: "CSP determines the impact level (Low / Li-SaaS / Moderate / High). Documents its SSP against the FedRAMP baseline for that level. Engages a FedRAMP-accredited 3PAO to assess. Pursues authorization via either the Agency path (a sponsoring agency's AO authorizes) or the JAB path (Joint Authorization Board issues a Provisional ATO). Once authorized, lands on the FedRAMP Marketplace. Operates a continuous monitoring program: monthly POA&M updates, vulnerability scans, annual reassessment, change management."
      - heading "Impact levels" [level=2] [ref=e31]
      - paragraph [ref=e32]: "FedRAMP uses four impact levels, mapped from FIPS 199 categorization with FedRAMP-specific control baselines:"
      - list [ref=e33]:
        - listitem [ref=e34]:
          - strong [ref=e35]: Low
          - text: — low-impact systems. Roughly 125 controls.
        - listitem [ref=e36]:
          - strong [ref=e37]: Li-SaaS
          - text: — Low-impact SaaS. A lighter variant of Low introduced in 2017 for collaboration / productivity SaaS that doesn’t store significant federal data. Reduced control set.
        - listitem [ref=e38]:
          - strong [ref=e39]: Moderate
          - text: — the most common authorization level for federal SaaS. Roughly 325 controls.
        - listitem [ref=e40]:
          - strong [ref=e41]: High
          - text: — sensitive federal data. Roughly 410+ controls. Most stringent.
      - paragraph [ref=e42]: The level you’re authorized at determines the size of your control surface and, downstream, the cost and time of your authorization and continuous monitoring effort.
      - heading "Authorization paths" [level=2] [ref=e43]
      - paragraph [ref=e44]: "Two paths historically existed. The landscape is in active modernization (see the In-the-field note below), but the structural distinction is worth knowing:"
      - list [ref=e45]:
        - listitem [ref=e46]:
          - strong [ref=e47]: Agency ATO
          - text: — a single sponsoring agency’s AO authorizes your cloud service for federal use. Other agencies can then leverage that authorization for their own ATOs (with their own additional overlay if they want one). This is the more common path.
        - listitem [ref=e48]:
          - strong [ref=e49]: JAB Provisional ATO (P-ATO)
          - text: — the Joint Authorization Board (DHS + DoD + GSA CIOs, historically) issues a provisional authorization that any federal agency can leverage without a single sponsor. Higher bar to enter; broader reach when achieved.
      - heading "The cast" [level=2] [ref=e50]
      - list [ref=e51]:
        - listitem [ref=e52]:
          - strong [ref=e53]: CSP (Cloud Service Provider)
          - text: — the company offering the service.
        - listitem [ref=e54]:
          - strong [ref=e55]: 3PAO (Third-Party Assessment Organization)
          - text: — FedRAMP-accredited assessor. Conducts the security assessment using SP 800-53A procedures against the FedRAMP baseline.
        - listitem [ref=e56]:
          - strong [ref=e57]: AO (Authorizing Official)
          - text: — at the sponsoring agency for Agency path, or on the JAB for JAB path.
        - listitem [ref=e58]:
          - strong [ref=e59]: FedRAMP PMO
          - text: — the GSA team that runs the program, maintains the marketplace, manages the JAB process, accredits 3PAOs.
        - listitem [ref=e60]:
          - strong [ref=e61]: Federal customer agency
          - text: — the buyer that ultimately uses (and sometimes sponsors) the authorization.
      - heading "Continuous monitoring" [level=2] [ref=e62]
      - paragraph [ref=e63]: "Authorization isn’t the end — it’s the start. Once authorized, a CSP runs continuous monitoring: monthly POA&M updates, vulnerability scans on a defined cadence, change management for system modifications, annual reassessment of a subset of controls, and full reassessment on a longer cycle. The 3PAO stays engaged for the ongoing assessment work. The federal customer agencies expect continuous monitoring deliverables on a regular schedule."
      - paragraph [ref=e64]: "This is the part that surprises new CSPs the most: the cost and operational burden of FedRAMP isn’t the initial authorization. It’s the multi-year continuous monitoring obligation that follows."
      - note [ref=e65]:
        - generic [ref=e66]:
          - generic [ref=e67]: ⚐
          - generic [ref=e68]: In the field
        - paragraph [ref=e70]: FedRAMP has been in active modernization for several years (sometimes branded “FedRAMP 20x” or under similar names depending on the cycle). The JAB P-ATO process was being restructured and partially phased out in favor of a streamlined Agency-path authorization with broader reusability. Authorization timelines that historically ran 12-24 months are explicitly being targeted for reduction. The structural shape — tailored 800-53 baseline, 3PAO assessment, AO authorization, continuous monitoring — is stable. The specific procedural state (which path is currently preferred, how much process automation has landed, what the JAB’s role is) drifts. Verify against current FedRAMP PMO guidance at fedramp.gov before relying on procedural specifics.
      - complementary [ref=e71]:
        - generic [ref=e72]: For you, Jordan
        - generic [ref=e73]:
          - paragraph [ref=e74]: "FedRAMP doesn’t apply to your hospital’s HIPAA work directly. But two indirect touches are worth knowing:"
          - paragraph [ref=e75]: If your hospital handles federal data flows (Medicare administration, federally funded research, VA telehealth), the cloud services serving those specific systems may need FedRAMP authorization for the federal-side compliance to work.
          - paragraph [ref=e76]: If your hospital is moving to “GovCloud” or any federal-grade cloud environment, FedRAMP is the assurance program behind those offerings. AWS GovCloud, Azure Government, GCP Government Cloud — all FedRAMP High-authorized environments.
          - paragraph [ref=e77]: For pure HIPAA work, HITRUST-certified or HIPAA-aligned cloud services are usually the more relevant reference point.
          - paragraph [ref=e78]:
            - strong [ref=e79]: "First-week move:"
            - text: ask whether any of your hospital’s systems use cloud services that carry FedRAMP authorization. The answer tells you whether FedRAMP is part of your compliance picture or just background context.
